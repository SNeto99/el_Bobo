<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Bobo Esponjo</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            background:
                radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 229, 89, 0.46), transparent 160px),
                linear-gradient(rgba(0, 0, 0, 0.32), rgba(0, 0, 0, 0.55)),
                url("bob esponja mafioso.webp") center / cover fixed no-repeat;
            cursor: none;
        }

        main {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }

        .hud {
            position: fixed;
            top: 18px;
            left: 18px;
            display: flex;
            gap: 10px;
            z-index: 20;
        }

        .hud span,
        .hud button,
        .level-alert {
            border: 2px solid rgba(255, 255, 255, 0.78);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.62);
            color: white;
            padding: 10px 14px;
            font-size: 1rem;
            font-weight: 800;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
        }

        .hud button {
            cursor: none;
        }

        .hud button:hover {
            background: rgba(255, 229, 89, 0.24);
        }

        .level-alert {
            position: fixed;
            top: 82px;
            left: 50%;
            transform: translateX(-50%) scale(0.94);
            opacity: 0;
            z-index: 20;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .level-alert.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        .instructions {
            position: fixed;
            right: 18px;
            bottom: 18px;
            max-width: 280px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.62);
            padding: 12px 14px;
            z-index: 20;
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.35;
            text-align: left;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.35);
        }

        .github-link {
            position: fixed;
            left: 18px;
            bottom: 18px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.78);
            border-radius: 8px;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(255, 212, 71, 0.18)),
                rgba(6, 8, 13, 0.82);
            color: white;
            padding: 12px 15px;
            z-index: 20;
            font-size: 0.95rem;
            font-weight: 900;
            text-decoration: none;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.22),
                0 0 18px rgba(255, 212, 71, 0.24),
                0 12px 24px rgba(0, 0, 0, 0.38);
            backdrop-filter: blur(6px);
            cursor: none;
            transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
        }

        .github-link svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.36));
            flex: 0 0 auto;
        }

        .github-link strong {
            color: #ffd447;
            letter-spacing: 0;
        }

        .github-link:hover {
            border-color: #ffd447;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.24),
                0 0 26px rgba(255, 212, 71, 0.42),
                0 16px 30px rgba(0, 0, 0, 0.44);
            transform: translateY(-2px);
        }

        .pause-overlay {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.7);
            opacity: 0;
            pointer-events: none;
            z-index: 30;
            backdrop-filter: blur(8px);
            transition: opacity 0.18s ease;
        }

        body.paused .pause-overlay {
            opacity: 1;
            pointer-events: auto;
        }

        .start-overlay {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.46);
            z-index: 29;
            backdrop-filter: blur(5px);
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        body.started .start-overlay {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .start-box {
            width: min(560px, 100%);
            border: 2px solid rgba(255, 255, 255, 0.82);
            border-radius: 8px;
            background:
                linear-gradient(135deg, rgba(255, 212, 71, 0.18), rgba(255, 255, 255, 0.06)),
                rgba(0, 0, 0, 0.74);
            padding: 30px;
            text-align: center;
            box-shadow:
                0 0 34px rgba(255, 229, 89, 0.4),
                0 24px 60px rgba(0, 0, 0, 0.55);
        }

        .start-box h2 {
            margin: 0 0 12px;
            font-size: clamp(1.9rem, 8vw, 3.5rem);
            text-transform: uppercase;
            text-shadow: 0 4px 18px rgba(0, 0, 0, 0.8);
        }

        .start-box p {
            margin: 0;
            color: #ffd447;
            font-size: clamp(1rem, 4vw, 1.3rem);
            font-weight: 900;
            text-transform: uppercase;
        }

        .pause-box {
            width: min(420px, 100%);
            border: 2px solid rgba(255, 255, 255, 0.82);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.78);
            padding: 28px;
            text-align: center;
            box-shadow:
                0 0 28px rgba(255, 229, 89, 0.45),
                0 24px 60px rgba(0, 0, 0, 0.55);
        }

        .pause-box h2 {
            margin: 0 0 12px;
            font-size: 2.2rem;
            text-transform: uppercase;
        }

        .pause-box p {
            margin: 0 0 20px;
            font-weight: 700;
            line-height: 1.4;
        }

        .resume-button {
            border: 2px solid rgba(255, 255, 255, 0.82);
            border-radius: 8px;
            background: #ffd447;
            color: #1c1400;
            padding: 12px 18px;
            cursor: none;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.35);
        }

        .resume-button:hover {
            filter: brightness(1.08);
        }

        .cursor-light {
            position: fixed;
            left: var(--mouse-x, 50%);
            top: var(--mouse-y, 50%);
            width: 34px;
            height: 34px;
            border: 2px solid rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
            box-shadow:
                0 0 18px rgba(255, 229, 89, 0.95),
                0 0 46px rgba(255, 229, 89, 0.7);
        }

        .falling-key {
            position: fixed;
            top: -70px;
            left: var(--left);
            min-width: 46px;
            height: 46px;
            padding: 0 12px;
            display: grid;
            place-items: center;
            border: 2px solid rgba(255, 255, 255, 0.85);
            border-bottom-width: 5px;
            border-radius: 8px;
            background: linear-gradient(180deg, #fff5b8, #e7b530);
            color: #1c1400;
            cursor: none;
            font-size: 1.15rem;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 12px 22px rgba(0, 0, 0, 0.35);
            pointer-events: auto;
            z-index: 5;
            animation: key-fall var(--duration) linear forwards;
            user-select: none;
        }

        .falling-key.hit {
            animation: key-hit 0.22s ease-out forwards;
        }

        body.paused .falling-key {
            animation-play-state: paused;
        }

        .shot {
            position: fixed;
            left: var(--shot-x);
            top: var(--shot-y);
            width: var(--shot-length);
            height: 7px;
            border-radius: 999px;
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0), #fff6a6 18%, #ffffff 50%, #ffcc2e 82%, rgba(255, 204, 46, 0));
            box-shadow:
                0 0 8px rgba(255, 255, 255, 0.95),
                0 0 18px rgba(255, 229, 89, 0.9),
                0 0 34px rgba(255, 175, 28, 0.75);
            transform: rotate(var(--shot-angle)) scaleX(0);
            transform-origin: left center;
            pointer-events: none;
            z-index: 8;
            animation: shot-flash 0.18s ease-out forwards;
        }

        .shot::after {
            content: "";
            position: absolute;
            right: -13px;
            top: 50%;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffffff 0 18%, #ffe25d 19% 48%, rgba(255, 226, 93, 0) 70%);
            transform: translateY(-50%);
            box-shadow: 0 0 22px rgba(255, 244, 157, 0.95);
        }

        .muzzle-flash {
            position: fixed;
            left: var(--flash-x);
            top: var(--flash-y);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: radial-gradient(circle, white 0 12%, #ffe25d 13% 42%, rgba(255, 226, 93, 0) 72%);
            transform: translate(-50%, -50%) scale(0.6);
            pointer-events: none;
            z-index: 9;
            animation: flash-pop 0.2s ease-out forwards;
        }

        @keyframes key-fall {
            0% {
                transform: translateY(0) rotate(var(--start-rotation));
                opacity: 1;
            }

            100% {
                transform: translateY(calc(100vh + 120px)) rotate(var(--end-rotation));
                opacity: 0.92;
            }
        }

        @keyframes key-hit {
            100% {
                transform: translateY(var(--hit-y)) scale(1.8) rotate(18deg);
                opacity: 0;
                filter: brightness(2);
            }
        }

        @keyframes shot-flash {
            45% {
                opacity: 1;
                transform: rotate(var(--shot-angle)) scaleX(1);
            }

            100% {
                opacity: 0;
                transform: rotate(var(--shot-angle)) scaleX(1);
            }
        }

        @keyframes flash-pop {
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.75);
            }
        }

        @media (max-width: 620px) {
            .hud {
                right: 12px;
                left: 12px;
                flex-wrap: wrap;
            }

            .hud span,
            .hud button {
                flex: 1;
                min-width: 90px;
                padding: 8px 10px;
                font-size: 0.9rem;
            }

            .instructions {
                right: 12px;
                left: 12px;
                max-width: none;
                font-size: 0.88rem;
            }

            .github-link {
                left: 12px;
                bottom: 82px;
                font-size: 0.88rem;
            }
        }
    </style>
</head>
<body>
    <div class="hud" aria-live="polite">
        <span>Pontos: <strong id="score">0</strong></span>
        <span>Nivel: <strong id="level">1</strong></span>
        <span>Erros: <strong id="misses">0</strong></span>
        <button id="pauseButton" type="button">Pause</button>
    </div>
    <div class="level-alert" id="levelAlert">Nivel 1</div>
    <main></main>
    <div class="instructions">Digite a letra que aparece antes dela cair. A cada 10 acertos o nivel sobe.</div>
    <a class="github-link" href="https://github.com/sNeto99" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.86 8.37 6.84 9.73.5.1.68-.22.68-.5v-1.9c-2.78.62-3.36-1.22-3.36-1.22-.46-1.18-1.12-1.5-1.12-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.57 2.36 1.12 2.94.86.09-.66.35-1.12.64-1.38-2.22-.26-4.56-1.14-4.56-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.7 0 0 .84-.28 2.75 1.05A9.25 9.25 0 0 1 12 6.97c.85 0 1.7.12 2.5.34 1.9-1.33 2.74-1.05 2.74-1.05.55 1.4.2 2.44.1 2.7.64.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.8-4.57 5.05.36.32.68.94.68 1.9v2.82c0 .28.18.6.69.5A10.1 10.1 0 0 0 22 12.25C22 6.58 17.52 2 12 2Z" />
        </svg>
        GitHub <strong>sNeto99</strong>
    </a>
    <div class="start-overlay" id="startOverlay">
        <div class="start-box">
            <h2>Atire nas teclas</h2>
            <p>Aperte qualquer tecla para começar ou clique na tela</p>
        </div>
    </div>
    <div class="pause-overlay" id="pauseOverlay" aria-hidden="true">
        <div class="pause-box">
            <h2>Pausado</h2>
            <p>O jogo esta congelado. Aperte Esc ou clique no botao para continuar.</p>
            <button class="resume-button" id="resumeButton" type="button">Continuar</button>
        </div>
    </div>
    <div class="cursor-light" aria-hidden="true"></div>

    <script>
        const root = document.documentElement;
        const scoreElement = document.querySelector("#score");
        const levelElement = document.querySelector("#level");
        const missesElement = document.querySelector("#misses");
        const levelAlert = document.querySelector("#levelAlert");
        const pauseButton = document.querySelector("#pauseButton");
        const startOverlay = document.querySelector("#startOverlay");
        const pauseOverlay = document.querySelector("#pauseOverlay");
        const resumeButton = document.querySelector("#resumeButton");
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const state = {
            score: 0,
            level: 1,
            misses: 0,
            spawnTimer: null,
            started: false,
            paused: false
        };

        window.addEventListener("mousemove", (event) => {
            root.style.setProperty("--mouse-x", `${event.clientX}px`);
            root.style.setProperty("--mouse-y", `${event.clientY}px`);
        });

        window.addEventListener("keydown", (event) => {
            if (event.repeat) {
                return;
            }

            if (!state.started) {
                startGame();
                return;
            }

            if (event.key === "Escape") {
                togglePause();
                return;
            }

            shoot(event.key);
        });

        startOverlay.addEventListener("mousedown", startGame);
        pauseButton.addEventListener("click", togglePause);
        resumeButton.addEventListener("click", togglePause);

        function spawnKey() {
            const letter = letters[Math.floor(Math.random() * letters.length)];
            const key = document.createElement("span");
            key.className = "falling-key";
            key.dataset.key = letter;
            key.textContent = letter;
            key.style.setProperty("--left", `${Math.random() * 92}vw`);
            key.style.setProperty("--duration", `${getFallDuration()}s`);
            key.style.setProperty("--start-rotation", `${-24 + Math.random() * 48}deg`);
            key.style.setProperty("--end-rotation", `${260 + Math.random() * 300}deg`);

            document.body.appendChild(key);
            key.addEventListener("mousedown", (event) => {
                event.preventDefault();
                hitTarget(key);
            });
            key.addEventListener("animationend", () => {
                if (!key.classList.contains("hit")) {
                    state.misses += 1;
                    updateHud();
                }

                key.remove();
            });
        }

        function shoot(pressedKey) {
            if (state.paused) {
                return;
            }

            const normalizedKey = pressedKey.toUpperCase();

            if (!letters.includes(normalizedKey)) {
                return;
            }

            const target = [...document.querySelectorAll(".falling-key:not(.hit)")]
                .filter((key) => key.dataset.key === normalizedKey)
                .sort((a, b) => b.getBoundingClientRect().top - a.getBoundingClientRect().top)[0];

            if (!target) {
                createShot();
                state.misses += 1;
                updateHud();
                return;
            }

            hitTarget(target);
        }

        function hitTarget(target) {
            if (state.paused) {
                return;
            }

            if (!target || target.classList.contains("hit")) {
                return;
            }

            createShot(target);
            const targetBox = target.getBoundingClientRect();
            target.style.animation = "none";
            target.style.top = `${targetBox.top}px`;
            target.style.left = `${targetBox.left}px`;
            target.style.width = `${targetBox.width}px`;
            target.style.setProperty("--hit-y", "0px");
            target.classList.add("hit");
            target.style.animation = "key-hit 0.22s ease-out forwards";
            state.score += 1;
            updateLevel();
            updateHud();
        }

        function createShot(target) {
            const startX = window.innerWidth / 2;
            const startY = window.innerHeight - 26;
            const endX = target ? target.getBoundingClientRect().left + target.getBoundingClientRect().width / 2 : startX + (-180 + Math.random() * 360);
            const endY = target ? target.getBoundingClientRect().top + target.getBoundingClientRect().height / 2 : startY - 360;
            const distanceX = endX - startX;
            const distanceY = endY - startY;
            const length = Math.hypot(distanceX, distanceY);
            const angle = Math.atan2(distanceY, distanceX) * 180 / Math.PI;
            const shot = document.createElement("span");
            const flash = document.createElement("span");

            shot.className = "shot";
            shot.style.setProperty("--shot-x", `${startX}px`);
            shot.style.setProperty("--shot-y", `${startY}px`);
            shot.style.setProperty("--shot-length", `${length}px`);
            shot.style.setProperty("--shot-angle", `${angle}deg`);

            document.body.appendChild(shot);
            shot.addEventListener("animationend", () => shot.remove());

            flash.className = "muzzle-flash";
            flash.style.setProperty("--flash-x", `${endX}px`);
            flash.style.setProperty("--flash-y", `${endY}px`);

            document.body.appendChild(flash);
            flash.addEventListener("animationend", () => flash.remove());
        }

        function updateLevel() {
            const nextLevel = Math.floor(state.score / 10) + 1;

            if (nextLevel === state.level) {
                return;
            }

            state.level = nextLevel;
            levelAlert.textContent = `Nivel ${state.level}`;
            levelAlert.classList.add("show");
            window.setTimeout(() => levelAlert.classList.remove("show"), 950);
        }

        function updateHud() {
            scoreElement.textContent = state.score;
            levelElement.textContent = state.level;
            missesElement.textContent = state.misses;
        }

        function startGame() {
            if (state.started) {
                return;
            }

            state.started = true;
            document.body.classList.add("started");
            scheduleSpawn();
        }

        function togglePause() {
            if (!state.started) {
                startGame();
                return;
            }

            state.paused = !state.paused;
            document.body.classList.toggle("paused", state.paused);
            pauseButton.textContent = state.paused ? "Continuar" : "Pause";
            pauseOverlay.setAttribute("aria-hidden", String(!state.paused));

            if (state.paused) {
                window.clearTimeout(state.spawnTimer);
                return;
            }

            scheduleSpawn();
        }

        function getFallDuration() {
            return Math.max(1.05, 4.2 - state.level * 0.28 + Math.random() * 0.7);
        }

        function getSpawnDelay() {
            return Math.max(290, 1150 - state.level * 82);
        }

        function scheduleSpawn() {
            if (state.paused) {
                return;
            }

            spawnKey();
            state.spawnTimer = window.setTimeout(scheduleSpawn, getSpawnDelay());
        }

        updateHud();
    </script>
</body>
</html>
